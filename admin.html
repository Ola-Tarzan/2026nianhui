<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026年会抽奖 · 互动控制台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b0716, #1c1230);
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* 动态背景光效 */
        body::before {
            content: '';
            position: fixed;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(255, 215, 0, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(155, 89, 182, 0.1) 0%, transparent 50%);
            animation: rotate 30s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .admin-wrap {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(20, 15, 30, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 50px;
            padding: 30px;
            position: relative;
            z-index: 1;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
            background: rgba(0,0,0,0.3);
            padding: 20px 30px;
            border-radius: 60px;
            border: 1px solid rgba(255,215,0,0.2);
        }

        .header-bar h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #ffd966, #ffb347, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient 3s ease infinite;
        }

        @keyframes gradient {
            0% { filter: hue-rotate(0deg); }
            50% { filter: hue-rotate(10deg); }
            100% { filter: hue-rotate(0deg); }
        }

        .stats-pill {
            background: rgba(255, 215, 0, 0.15);
            border: 2px solid #ffd700;
            border-radius: 60px;
            padding: 15px 35px;
            color: #ffd966;
            font-size: 1.5rem;
            font-weight: 600;
            box-shadow: 0 0 20px rgba(255,215,0,0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 20px rgba(255,215,0,0.3); }
            50% { box-shadow: 0 0 40px rgba(255,215,0,0.6); }
            100% { box-shadow: 0 0 20px rgba(255,215,0,0.3); }
        }

        .pool-container {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 40px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            transition: all 0.3s;
        }

        .pool-header {
            display: flex;
            justify-content: space-between;
            color: #ffd7b3;
            font-size: 1.4rem;
            margin-bottom: 20px;
        }

        .number-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            max-height: 250px;
            overflow-y: auto;
            padding: 5px 0;
            transition: all 0.3s;
        }

        .number-chip {
            background: #2a1e36;
            border: 2px solid #ffd70080;
            border-radius: 50px;
            padding: 12px 24px;
            font-size: 1.3rem;
            font-weight: 700;
            color: #ffd966;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .number-chip:hover {
            transform: scale(1.1);
            border-color: #ffd700;
            box-shadow: 0 0 30px #ffd700;
            background: #3a2a4a;
        }

        /* 抽中的号码高亮效果 */
        .number-chip.winner-highlight {
            animation: winnerGlow 1s ease infinite;
            background: linear-gradient(145deg, #ffd700, #ffb347);
            color: #1a0f1e;
            font-weight: 800;
            border-color: white;
            transform: scale(1.1);
            z-index: 10;
        }

        @keyframes winnerGlow {
            0% { box-shadow: 0 0 20px #ffd700; }
            50% { box-shadow: 0 0 50px #ffd700, 0 0 100px #ffb347; }
            100% { box-shadow: 0 0 20px #ffd700; }
        }

        /* 轮盘抽奖区域 */
        .roulette-section {
            background: linear-gradient(145deg, #1a1035, #2d1b4a);
            border-radius: 50px;
            padding: 30px;
            margin-bottom: 30px;
            border: 2px solid #ffd700;
            position: relative;
            overflow: hidden;
        }

        .roulette-section::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,215,0,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        .roulette-title {
            text-align: center;
            color: white;
            font-size: 2rem;
            margin-bottom: 20px;
            position: relative;
            z-index: 2;
        }

        .roulette-title span {
            background: linear-gradient(135deg, #ffd966, #ffb347);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 轮盘动画 */
        .roulette-wheel {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 30px 0;
            position: relative;
            z-index: 2;
        }

        .wheel-number {
            width: 100px;
            height: 100px;
            background: rgba(0,0,0,0.5);
            border: 3px solid #ffd700;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 800;
            color: #ffd966;
            transition: all 0.1s;
            box-shadow: 0 0 30px rgba(255,215,0,0.3);
        }

        .wheel-number.spinning {
            animation: spinNumber 0.1s linear infinite;
            border-color: #ff6b6b;
            box-shadow: 0 0 50px #ff6b6b;
        }

        @keyframes spinNumber {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(5deg) scale(1.1); }
            75% { transform: rotate(-5deg) scale(1.1); }
            100% { transform: rotate(0deg) scale(1); }
        }

        .wheel-controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
            position: relative;
            z-index: 2;
        }

        .btn-roulette {
            background: linear-gradient(145deg, #ffd700, #ffb347);
            border: none;
            padding: 20px 50px;
            border-radius: 60px;
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a0f1e;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 10px 30px rgba(255,215,0,0.3);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-roulette:hover {
            transform: scale(1.05);
            box-shadow: 0 20px 50px #ffd700;
        }

        .btn-roulette:active {
            transform: scale(0.95);
        }

        .btn-roulette.spinning {
            animation: buttonPulse 0.5s ease infinite;
        }

        @keyframes buttonPulse {
            0% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
            100% { filter: brightness(1); }
        }

        /* 批量抽奖区域 */
        .batch-section {
            background: rgba(155, 89, 182, 0.15);
            border-radius: 40px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid #9b59b6;
            transition: all 0.3s;
        }

        .batch-section:hover {
            border-color: #ffd700;
            box-shadow: 0 0 30px rgba(155,89,182,0.3);
        }

        .batch-section h2 {
            color: #d9b3ff;
            font-size: 1.8rem;
            margin-bottom: 20px;
        }

        .batch-controls {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .batch-controls label {
            color: #cdb5e8;
            font-size: 1.2rem;
        }

        .batch-controls input {
            background: #00000050;
            border: 2px solid #ffd700;
            border-radius: 40px;
            padding: 14px 25px;
            color: white;
            font-size: 1.2rem;
            width: 100px;
            text-align: center;
        }

        .btn-batch {
            background: linear-gradient(145deg, #9b59b6, #8e44ad);
            border: none;
            padding: 16px 35px;
            border-radius: 60px;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-batch:hover {
            box-shadow: 0 0 30px #9b59b6;
            transform: scale(1.02);
        }

        .results-panel {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 40px;
            padding: 25px;
        }

        .last-draw {
            background: linear-gradient(145deg, #1f1429, #2a1a35);
            border-radius: 40px;
            padding: 25px;
            text-align: center;
            border: 3px solid #ffd700;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
        }

        .last-draw::after {
            content: '🎉';
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 5rem;
            opacity: 0.1;
        }

        .last-draw .label {
            color: #ffd7b3;
            font-size: 1.5rem;
        }

        .last-draw .number {
            font-size: 6rem;
            font-weight: 800;
            color: #ffd700;
            text-shadow: 0 0 40px #ffb700;
            line-height: 1.2;
            transition: all 0.3s;
        }

        .last-draw .number.celebrate {
            animation: celebrate 0.5s ease infinite;
        }

        @keyframes celebrate {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); text-shadow: 0 0 80px #ffd700; }
            100% { transform: scale(1); }
        }

        .batch-results {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
            min-height: 80px;
        }

        .winner-badge {
            background: radial-gradient(circle at top left, #ffd700, #ffb347);
            color: #1a0f1e;
            font-size: 2rem;
            font-weight: 700;
            padding: 18px 32px;
            border-radius: 70px;
            box-shadow: 0 0 30px #ffd700;
            border: 2px solid white;
            animation: popIn 0.3s ease;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .btn {
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .btn-gold {
            background: #ffd700;
            color: #1a0f1e;
        }

        .btn-gold:hover {
            background: #ffb347;
            box-shadow: 0 0 25px #ffd700;
        }

        .btn-glass {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.5);
            color: #ffd7b3;
        }

        .btn-glass:hover {
            background: rgba(255,215,0,0.15);
        }

        .btn-danger {
            background: rgba(255, 80, 80, 0.2);
            border: 1px solid #ff8888;
            color: #ffb3b3;
        }

        .btn-danger:hover {
            background: rgba(255, 80, 80, 0.35);
        }

        /* 全屏通知 */
        .toast-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(145deg, #ffd700, #ffb347);
            color: #1a0f1e;
            padding: 30px 60px;
            border-radius: 60px;
            font-size: 3rem;
            font-weight: 800;
            z-index: 9999;
            animation: toastIn 0.5s ease, toastOut 0.5s ease 2.5s;
            box-shadow: 0 0 100px #ffd700;
            border: 4px solid white;
        }

        @keyframes toastIn {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            80% { transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        @keyframes toastOut {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="admin-wrap">
        <div class="header-bar">
            <h1>⚙️ 2026 年会互动抽奖台</h1>
            <div class="stats-pill" id="poolStats">0 / 78</div>
        </div>

        <!-- 轮盘抽奖区（新！） -->
        <div class="roulette-section">
            <div class="roulette-title">
                🎰 <span>幸运大轮盘</span> 🎰
            </div>
            
            <!-- 轮盘数字显示 -->
            <div class="roulette-wheel">
                <div class="wheel-number" id="wheelNumber1">?</div>
                <div class="wheel-number" id="wheelNumber2">?</div>
                <div class="wheel-number" id="wheelNumber3">?</div>
            </div>

            <!-- 轮盘控制按钮 -->
            <div class="wheel-controls">
                <button class="btn-roulette" id="rouletteDrawBtn">
                    <span>🎲</span> 转动轮盘抽奖
                </button>
                <button class="btn-roulette" id="rouletteStopBtn" style="background: linear-gradient(145deg, #ff6b6b, #ff4757);">
                    <span>⏹️</span> 停止
                </button>
            </div>
        </div>

        <div class="pool-container">
            <div class="pool-header">
                <span>📋 当前号码池</span>
                <span>总数 <span id="poolSize">0</span></span>
            </div>
            <div class="number-grid" id="poolGrid"></div>
        </div>

        <div class="batch-section">
            <h2>🎰 批量抽奖</h2>
            <div class="batch-controls">
                <label>抽取数量</label>
                <input type="number" id="batchCount" min="1" max="78" value="3">
                <button class="btn-batch" id="batchDrawBtn">✨ 一次抽取多个</button>
                <button class="btn btn-glass" id="clearBatchBtn">清除结果</button>
            </div>
            <div class="batch-results" id="batchResults"></div>
        </div>

        <div class="results-panel">
            <div class="last-draw">
                <div class="label">🏆 最近中奖号码</div>
                <div class="number" id="lastDrawDisplay">——</div>
            </div>

            <div class="action-buttons">
                <button class="btn btn-gold" id="drawOneBtn">🎲 抽一个</button>
                <button class="btn btn-glass" id="resetDrawBtn">🔄 重置显示</button>
                <button class="btn btn-danger" id="clearAllBtn">🗑️ 清空全部</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const MAX_EMPLOYEES = 78;
            const STORAGE_KEY = 'raffle_2026_gala';

            let employees = {};
            let numberPool = new Set();
            let lastDraw = null;
            let spinningInterval = null;
            let isSpinning = false;
            let currentWheelNumbers = ['?', '?', '?'];

            function loadData() {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) {
                        const data = JSON.parse(saved);
                        employees = data.employees || {};
                        numberPool = new Set((data.numberPool || []).map(n => Number(n)));
                        lastDraw = data.lastDraw ? Number(data.lastDraw) : null;
                    }
                } catch (e) {
                    employees = {};
                    numberPool = new Set();
                    lastDraw = null;
                }
            }

            function saveData() {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify({
                        employees: employees,
                        numberPool: Array.from(numberPool),
                        lastDraw: lastDraw
                    }));
                } catch (e) {}
            }

            // 显示全屏通知
            function showToast(number) {
                const toast = document.createElement('div');
                toast.className = 'toast-message';
                toast.textContent = `🎉 ${number} 🎉`;
                document.body.appendChild(toast);
                
                setTimeout(() => {
                    toast.remove();
                }, 3000);
            }

            // 高亮抽中的号码
            function highlightWinner(number) {
                const chips = document.querySelectorAll('.number-chip');
                chips.forEach(chip => {
                    chip.classList.remove('winner-highlight');
                    if (chip.textContent == number) {
                        chip.classList.add('winner-highlight');
                        // 滚动到该号码
                        chip.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                });
            }

            // 开始轮盘旋转
            function startRouletteSpin() {
                if (numberPool.size === 0) {
                    alert('号码池为空，无法抽奖');
                    return false;
                }

                isSpinning = true;
                const wheelNumbers = [
                    document.getElementById('wheelNumber1'),
                    document.getElementById('wheelNumber2'),
                    document.getElementById('wheelNumber3')
                ];

                wheelNumbers.forEach(num => num.classList.add('spinning'));

                spinningInterval = setInterval(() => {
                    const poolArray = Array.from(numberPool);
                    if (poolArray.length > 0) {
                        currentWheelNumbers = [
                            poolArray[Math.floor(Math.random() * poolArray.length)],
                            poolArray[Math.floor(Math.random() * poolArray.length)],
                            poolArray[Math.floor(Math.random() * poolArray.length)]
                        ];
                        wheelNumbers.forEach((num, index) => {
                            num.textContent = currentWheelNumbers[index];
                        });
                    }
                }, 100);

                return true;
            }

            // 停止轮盘并抽奖
            function stopRouletteAndDraw() {
                if (!isSpinning) return;

                clearInterval(spinningInterval);
                isSpinning = false;

                const wheelNumbers = [
                    document.getElementById('wheelNumber1'),
                    document.getElementById('wheelNumber2'),
                    document.getElementById('wheelNumber3')
                ];

                wheelNumbers.forEach(num => num.classList.remove('spinning'));

                // 从三个数字中随机选一个作为最终中奖号码
                const finalNumber = currentWheelNumbers[Math.floor(Math.random() * currentWheelNumbers.length)];
                
                // 检查这个号码是否还在池中
                if (numberPool.has(finalNumber)) {
                    numberPool.delete(finalNumber);
                    lastDraw = finalNumber;
                    saveData();
                    
                    // 显示特效
                    showToast(finalNumber);
                    highlightWinner(finalNumber);
                    
                    // 让最后显示的号码闪烁庆祝
                    const lastDrawElement = document.getElementById('lastDrawDisplay');
                    lastDrawElement.textContent = finalNumber;
                    lastDrawElement.classList.add('celebrate');
                    setTimeout(() => {
                        lastDrawElement.classList.remove('celebrate');
                    }, 2000);
                } else {
                    alert('这个号码刚刚被抽走了，重新转动吧！');
                }
                
                refreshUI();
            }

            function drawSingle() {
                if (numberPool.size === 0) {
                    alert('号码池为空');
                    return false;
                }
                const arr = Array.from(numberPool);
                const rand = arr[Math.floor(Math.random() * arr.length)];
                numberPool.delete(rand);
                lastDraw = rand;
                saveData();
                
                // 显示特效
                showToast(rand);
                highlightWinner(rand);
                
                refreshUI();
                return true;
            }

            function drawBatch(count) {
                if (numberPool.size === 0) return [];
                if (count > numberPool.size) {
                    if (!confirm(`池中只有 ${numberPool.size} 个号码，是否全部抽出？`)) return [];
                    count = numberPool.size;
                }
                const arr = Array.from(numberPool);
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                const drawn = arr.slice(0, count);
                drawn.forEach(n => numberPool.delete(n));
                if (drawn.length > 0) {
                    lastDraw = drawn[drawn.length - 1];
                    // 显示特效（只显示最后一个）
                    showToast(lastDraw);
                    highlightWinner(lastDraw);
                }
                saveData();
                return drawn;
            }

            function resetLastDraw() {
                lastDraw = null;
                saveData();
                refreshUI();
            }

            function clearAll() {
                if (!confirm('⚠️ 确定清空所有员工号码吗？此操作不可撤销。')) return;
                employees = {};
                numberPool.clear();
                lastDraw = null;
                sessionStorage.removeItem('lastEmpKey');
                saveData();
                refreshUI();
                document.getElementById('batchResults').innerHTML = '';
                
                // 重置轮盘
                if (spinningInterval) {
                    clearInterval(spinningInterval);
                    isSpinning = false;
                }
                document.getElementById('wheelNumber1').textContent = '?';
                document.getElementById('wheelNumber2').textContent = '?';
                document.getElementById('wheelNumber3').textContent = '?';
            }

            function refreshUI() {
                document.getElementById('poolSize').innerText = numberPool.size;
                document.getElementById('poolStats').innerText = `${numberPool.size} / ${MAX_EMPLOYEES}`;

                const poolGrid = document.getElementById('poolGrid');
                const sorted = Array.from(numberPool).sort((a,b)=>a-b);
                if (sorted.length) {
                    poolGrid.innerHTML = sorted.map(n => `<span class="number-chip">${n}</span>`).join('');
                } else {
                    poolGrid.innerHTML = '<span style="color:#8f7aa8;">✨ 暂无号码</span>';
                }

                document.getElementById('lastDrawDisplay').innerText = lastDraw !== null ? lastDraw : '——';
            }

            window.addEventListener('DOMContentLoaded', () => {
                loadData();
                refreshUI();

                const drawOne = document.getElementById('drawOneBtn');
                const resetDraw = document.getElementById('resetDrawBtn');
                const clearAllBtn = document.getElementById('clearAllBtn');
                const batchDrawBtn = document.getElementById('batchDrawBtn');
                const batchCount = document.getElementById('batchCount');
                const batchResults = document.getElementById('batchResults');
                const clearBatch = document.getElementById('clearBatchBtn');
                const rouletteDrawBtn = document.getElementById('rouletteDrawBtn');
                const rouletteStopBtn = document.getElementById('rouletteStopBtn');

                drawOne.addEventListener('click', drawSingle);
                resetDraw.addEventListener('click', resetLastDraw);
                clearAllBtn.addEventListener('click', clearAll);

                // 轮盘抽奖
                rouletteDrawBtn.addEventListener('click', () => {
                    startRouletteSpin();
                });

                rouletteStopBtn.addEventListener('click', () => {
                    stopRouletteAndDraw();
                });

                batchDrawBtn.addEventListener('click', () => {
                    let count = parseInt(batchCount.value, 10);
                    if (isNaN(count) || count < 1) count = 1;
                    const drawn = drawBatch(count);
                    if (drawn.length) {
                        batchResults.innerHTML = drawn.map(n => `<span class="winner-badge">🎉 ${n}</span>`).join('');
                    } else {
                        batchResults.innerHTML = '';
                    }
                    refreshUI();
                });

                clearBatch.addEventListener('click', () => {
                    batchResults.innerHTML = '';
                });

                batchCount.addEventListener('change', function() {
                    let v = parseInt(this.value, 10);
                    if (isNaN(v) || v < 1) this.value = 1;
                    else if (v > MAX_EMPLOYEES) this.value = MAX_EMPLOYEES;
                });
            });
        })();
    </script>
</body>
</html>
