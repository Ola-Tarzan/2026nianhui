<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026年会抽奖 · 管理后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b0716, #1c1230);
            padding: 20px;
        }

        .admin-wrap {
            max-width: 1300px;
            margin: 0 auto;
            background: rgba(20, 15, 30, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 50px;
            padding: 30px;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .header-bar h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #ffd966, #ffb347);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-pill {
            background: rgba(255, 215, 0, 0.15);
            border: 2px solid #ffd700;
            border-radius: 60px;
            padding: 15px 35px;
            color: #ffd966;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .pool-container {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 40px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .pool-header {
            display: flex;
            justify-content: space-between;
            color: #ffd7b3;
            font-size: 1.4rem;
            margin-bottom: 20px;
        }

        .number-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            max-height: 200px;
            overflow-y: auto;
            padding: 5px 0;
        }

        .number-chip {
            background: #2a1e36;
            border: 2px solid #ffd70080;
            border-radius: 50px;
            padding: 12px 24px;
            font-size: 1.3rem;
            font-weight: 700;
            color: #ffd966;
        }

        .batch-section {
            background: rgba(155, 89, 182, 0.12);
            border-radius: 40px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid #9b59b6;
        }

        .batch-section h2 {
            color: #d9b3ff;
            font-size: 1.8rem;
            margin-bottom: 20px;
        }

        .batch-controls {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .batch-controls label {
            color: #cdb5e8;
            font-size: 1.2rem;
        }

        .batch-controls input {
            background: #00000050;
            border: 2px solid #ffd700;
            border-radius: 40px;
            padding: 14px 25px;
            color: white;
            font-size: 1.2rem;
            width: 100px;
            text-align: center;
        }

        .btn-batch {
            background: linear-gradient(145deg, #9b59b6, #8e44ad);
            border: none;
            padding: 16px 35px;
            border-radius: 60px;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-batch:hover {
            box-shadow: 0 0 30px #9b59b6;
            transform: scale(1.02);
        }

        .results-panel {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 40px;
            padding: 25px;
        }

        .last-draw {
            background: #1f1429;
            border-radius: 40px;
            padding: 20px;
            text-align: center;
            border: 3px solid #ffd700;
            margin-bottom: 25px;
        }

        .last-draw .label {
            color: #ffd7b3;
            font-size: 1.3rem;
        }

        .last-draw .number {
            font-size: 5rem;
            font-weight: 800;
            color: #ffd700;
            text-shadow: 0 0 40px #ffb700;
        }

        .batch-results {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
            min-height: 80px;
        }

        .winner-badge {
            background: radial-gradient(circle at top left, #ffd700, #ffb347);
            color: #1a0f1e;
            font-size: 2rem;
            font-weight: 700;
            padding: 18px 32px;
            border-radius: 70px;
            box-shadow: 0 0 30px #ffd700;
            border: 2px solid white;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .btn {
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .btn-gold {
            background: #ffd700;
            color: #1a0f1e;
        }

        .btn-gold:hover {
            background: #ffb347;
            box-shadow: 0 0 25px #ffd700;
        }

        .btn-glass {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.5);
            color: #ffd7b3;
        }

        .btn-glass:hover {
            background: rgba(255,215,0,0.15);
        }

        .btn-danger {
            background: rgba(255, 80, 80, 0.2);
            border: 1px solid #ff8888;
            color: #ffb3b3;
        }

        .btn-danger:hover {
            background: rgba(255, 80, 80, 0.35);
        }
    </style>
</head>
<body>
    <div class="admin-wrap">
        <div class="header-bar">
            <h1>⚙️ 管理员控制台</h1>
            <div class="stats-pill" id="poolStats">0 / 78</div>
        </div>

        <div class="pool-container">
            <div class="pool-header">
                <span>📋 当前号码池</span>
                <span>总数 <span id="poolSize">0</span></span>
            </div>
            <div class="number-grid" id="poolGrid"></div>
        </div>

        <div class="batch-section">
            <h2>🎰 批量抽奖</h2>
            <div class="batch-controls">
                <label>抽取数量</label>
                <input type="number" id="batchCount" min="1" max="78" value="3">
                <button class="btn-batch" id="batchDrawBtn">✨ 一次抽取多个</button>
                <button class="btn btn-glass" id="clearBatchBtn">清除结果</button>
            </div>
            <div class="batch-results" id="batchResults"></div>
        </div>

        <div class="results-panel">
            <div class="last-draw">
                <div class="label">🏆 最近中奖号码</div>
                <div class="number" id="lastDrawDisplay">——</div>
            </div>

            <div class="action-buttons">
                <button class="btn btn-gold" id="drawOneBtn">🎲 抽一个</button>
                <button class="btn btn-glass" id="resetDrawBtn">🔄 重置显示</button>
                <button class="btn btn-danger" id="clearAllBtn">🗑️ 清空全部</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const MAX_EMPLOYEES = 78;
            const STORAGE_KEY = 'raffle_2026_gala';

            let employees = {};
            let numberPool = new Set();
            let lastDraw = null;

            function loadData() {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) {
                        const data = JSON.parse(saved);
                        employees = data.employees || {};
                        numberPool = new Set((data.numberPool || []).map(n => Number(n)));
                        lastDraw = data.lastDraw ? Number(data.lastDraw) : null;
                    }
                } catch (e) {
                    employees = {};
                    numberPool = new Set();
                    lastDraw = null;
                }
            }

            function saveData() {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify({
                        employees: employees,
                        numberPool: Array.from(numberPool),
                        lastDraw: lastDraw
                    }));
                } catch (e) {}
            }

            function drawSingle() {
                if (numberPool.size === 0) {
                    alert('号码池为空');
                    return false;
                }
                const arr = Array.from(numberPool);
                const rand = arr[Math.floor(Math.random() * arr.length)];
                numberPool.delete(rand);
                lastDraw = rand;
                saveData();
                refreshUI();
                return true;
            }

            function drawBatch(count) {
                if (numberPool.size === 0) return [];
                if (count > numberPool.size) {
                    if (!confirm(`池中只有 ${numberPool.size} 个号码，是否全部抽出？`)) return [];
                    count = numberPool.size;
                }
                const arr = Array.from(numberPool);
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                const drawn = arr.slice(0, count);
                drawn.forEach(n => numberPool.delete(n));
                if (drawn.length > 0) lastDraw = drawn[drawn.length - 1];
                saveData();
                return drawn;
            }

            function resetLastDraw() {
                lastDraw = null;
                saveData();
                refreshUI();
            }

            function clearAll() {
                if (!confirm('⚠️ 确定清空所有员工号码吗？此操作不可撤销。')) return;
                employees = {};
                numberPool.clear();
                lastDraw = null;
                sessionStorage.removeItem('lastEmpKey');
                saveData();
                refreshUI();
                document.getElementById('batchResults').innerHTML = '';
            }

            function refreshUI() {
                document.getElementById('poolSize').innerText = numberPool.size;
                document.getElementById('poolStats').innerText = `${numberPool.size} / ${MAX_EMPLOYEES}`;

                const poolGrid = document.getElementById('poolGrid');
                const sorted = Array.from(numberPool).sort((a,b)=>a-b);
                if (sorted.length) {
                    poolGrid.innerHTML = sorted.map(n => `<span class="number-chip">${n}</span>`).join('');
                } else {
                    poolGrid.innerHTML = '<span style="color:#8f7aa8;">✨ 暂无号码</span>';
                }

                document.getElementById('lastDrawDisplay').innerText = lastDraw !== null ? lastDraw : '——';
            }

            window.addEventListener('DOMContentLoaded', () => {
                loadData();
                refreshUI();

                const drawOne = document.getElementById('drawOneBtn');
                const resetDraw = document.getElementById('resetDrawBtn');
                const clearAllBtn = document.getElementById('clearAllBtn');
                const batchDrawBtn = document.getElementById('batchDrawBtn');
                const batchCount = document.getElementById('batchCount');
                const batchResults = document.getElementById('batchResults');
                const clearBatch = document.getElementById('clearBatchBtn');

                drawOne.addEventListener('click', drawSingle);
                resetDraw.addEventListener('click', resetLastDraw);
                clearAllBtn.addEventListener('click', clearAll);

                batchDrawBtn.addEventListener('click', () => {
                    let count = parseInt(batchCount.value, 10);
                    if (isNaN(count) || count < 1) count = 1;
                    const drawn = drawBatch(count);
                    if (drawn.length) {
                        batchResults.innerHTML = drawn.map(n => `<span class="winner-badge">🎉 ${n}</span>`).join('');
                    } else {
                        batchResults.innerHTML = '';
                    }
                    refreshUI();
                });

                clearBatch.addEventListener('click', () => {
                    batchResults.innerHTML = '';
                });

                batchCount.addEventListener('change', function() {
                    let v = parseInt(this.value, 10);
                    if (isNaN(v) || v < 1) this.value = 1;
                    else if (v > MAX_EMPLOYEES) this.value = MAX_EMPLOYEES;
                });
            });
        })();
    </script>
</body>
</html>
